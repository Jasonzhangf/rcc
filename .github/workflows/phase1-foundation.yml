name: phase1-foundation

on:
  push:
  pull_request:

jobs:
  verify-phase1-foundation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify phase1 foundation
        run: python3 scripts/verify_phase1_foundation.py
