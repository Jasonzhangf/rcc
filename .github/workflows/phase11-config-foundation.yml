name: phase11-config-foundation

on:
  push:
  pull_request:

jobs:
  verify-phase11-config-foundation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify phase11 config foundation
        run: bash scripts/verify_phase11_config_foundation_batch05.sh
