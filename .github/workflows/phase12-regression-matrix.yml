name: phase12-regression-matrix

on:
  workflow_dispatch:
  push:
    paths:
      - "AGENTS.md"
      - "docs/agent-routing/150-regression-matrix-routing.md"
      - "docs/PHASE_12_REGRESSION_MATRIX_WORKFLOW.md"
      - "docs/PHASE_12_REGRESSION_MATRIX_BATCH_01.md"
      - "docs/PHASE_12_REGRESSION_MATRIX_BATCH_02.md"
      - "docs/PHASE_12_REGRESSION_MATRIX_BATCH_03.md"
      - "docs/PHASE_12_REGRESSION_MATRIX_BATCH_04.md"
      - "docs/PHASE_12_REGRESSION_MATRIX_BATCH_05.md"
      - "docs/PHASE_12_REGRESSION_MATRIX_CLOSEOUT.md"
      - "docs/PHASE_12_REGRESSION_MATRIX_GAP_INVENTORY.md"
      - "docs/PROTOCOL_COMPATIBILITY_MATRIX.md"
      - ".agents/skills/rcc-regression-matrix/SKILL.md"
      - "scripts/verify_phase12_regression_matrix.py"
      - "scripts/verify_phase12_regression_matrix_batch01.sh"
      - "scripts/verify_phase12_regression_matrix_batch02.sh"
      - "scripts/verify_phase12_regression_matrix_batch03.sh"
      - "scripts/verify_phase12_regression_matrix_batch04.sh"
      - "scripts/verify_phase12_regression_matrix_batch05.sh"
      - "fixtures/mock-provider/**"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Verify phase12 docs gate
        run: python3 scripts/verify_phase12_regression_matrix.py
      - name: Verify phase12 batch01 gate
        run: bash scripts/verify_phase12_regression_matrix_batch01.sh
      - name: Verify phase12 batch02 gate
        run: bash scripts/verify_phase12_regression_matrix_batch02.sh
      - name: Verify phase12 batch03 gate
        run: bash scripts/verify_phase12_regression_matrix_batch03.sh
      - name: Verify phase12 batch04 gate
        run: bash scripts/verify_phase12_regression_matrix_batch04.sh
      - name: Verify phase12 batch05 gate
        run: bash scripts/verify_phase12_regression_matrix_batch05.sh
