name: phase13-responses-continuation-matrix

on:
  workflow_dispatch:
  push:
    paths:
      - "AGENTS.md"
      - "docs/agent-routing/00-entry-routing.md"
      - "docs/agent-routing/160-responses-continuation-matrix-routing.md"
      - "docs/PHASE_13_RESPONSES_CONTINUATION_MATRIX_WORKFLOW.md"
      - "docs/PHASE_13_RESPONSES_CONTINUATION_MATRIX_BATCH_01.md"
      - "docs/PHASE_13_RESPONSES_CONTINUATION_MATRIX_BATCH_02.md"
      - "docs/PHASE_13_RESPONSES_CONTINUATION_MATRIX_BATCH_03.md"
      - "docs/PHASE_13_RESPONSES_CONTINUATION_MATRIX_BATCH_04.md"
      - "docs/PHASE_13_RESPONSES_CONTINUATION_MATRIX_BATCH_05.md"
      - "docs/PHASE_13_RESPONSES_CONTINUATION_MATRIX_CLOSEOUT.md"
      - "docs/PHASE_13_RESPONSES_CONTINUATION_MATRIX_GAP_INVENTORY.md"
      - "docs/TESTING_AND_ACCEPTANCE.md"
      - ".agents/skills/rcc-responses-continuation-matrix/SKILL.md"
      - "scripts/verify_phase13_responses_continuation_matrix.py"
      - "scripts/verify_phase13_responses_continuation_matrix_batch01.sh"
      - "scripts/verify_phase13_responses_continuation_matrix_batch02.sh"
      - "scripts/verify_phase13_responses_continuation_matrix_batch03.sh"
      - "scripts/verify_phase13_responses_continuation_matrix_batch04.sh"
      - "scripts/verify_phase13_responses_continuation_matrix_batch05.sh"
      - "rust/crates/rcc-core-domain/src/lib.rs"
      - "rust/crates/rcc-core-domain/src/continuation_semantics.rs"
      - "rust/crates/rcc-core-domain/src/responses_ingress.rs"
      - "rust/crates/rcc-core-domain/src/responses_conversation.rs"
      - "rust/crates/rcc-core-pipeline/src/lib.rs"
      - "rust/crates/rcc-core-testkit/src/lib.rs"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Verify phase13 docs gate
        run: python3 scripts/verify_phase13_responses_continuation_matrix.py
      - name: Verify phase13 batch01 gate
        run: bash scripts/verify_phase13_responses_continuation_matrix_batch01.sh
      - name: Verify phase13 batch02 gate
        run: bash scripts/verify_phase13_responses_continuation_matrix_batch02.sh
      - name: Verify phase13 batch03 gate
        run: bash scripts/verify_phase13_responses_continuation_matrix_batch03.sh
      - name: Verify phase13 batch04 gate
        run: bash scripts/verify_phase13_responses_continuation_matrix_batch04.sh
      - name: Verify phase13 batch05 gate
        run: bash scripts/verify_phase13_responses_continuation_matrix_batch05.sh
