name: phase2-architecture-docs

on:
  push:
  pull_request:

jobs:
  verify-phase2-architecture-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify phase2 architecture docs
        run: python3 scripts/verify_phase2_architecture_docs.py
