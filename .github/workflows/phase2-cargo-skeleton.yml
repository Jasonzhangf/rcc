name: phase2-cargo-skeleton

on:
  push:
  pull_request:

jobs:
  verify-phase2-cargo-skeleton:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify phase2 cargo skeleton
        run: bash scripts/verify_phase2_cargo_skeleton.sh
