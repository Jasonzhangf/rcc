name: phase3-pure-functions

on:
  push:
  pull_request:

jobs:
  verify-phase3-pure-functions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify phase3 pure functions
        run: bash scripts/verify_phase3_followup_tool_compact.sh
