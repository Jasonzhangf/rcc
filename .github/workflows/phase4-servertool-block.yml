name: phase4-servertool-block

on:
  push:
  pull_request:

jobs:
  verify-phase4-servertool-block:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify phase4 servertool block
        run: bash scripts/verify_phase4_servertool_reasoning_stop_fail_count.sh
