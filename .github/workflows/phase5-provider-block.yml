name: phase5-provider-block

on:
  push:
  pull_request:

jobs:
  verify-phase5-provider-block:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify phase5 provider block
        run: bash scripts/verify_phase5_provider_transport_request_plan.sh
