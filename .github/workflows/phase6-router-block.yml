name: phase6-router-block

on:
  push:
  pull_request:

jobs:
  verify-phase6-router-block:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify phase6 router block
        run: python3 scripts/verify_phase6_router_block.py
