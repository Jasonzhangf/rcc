name: phase7-host-server

on:
  push:
  pull_request:

jobs:
  verify-phase7-host-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify phase7 host server
        run: bash scripts/verify_phase7_host_server_batch04.sh
