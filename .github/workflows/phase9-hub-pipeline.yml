name: phase9-hub-pipeline

on:
  push:
  pull_request:

jobs:
  verify-phase9-hub-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify phase9 hub pipeline
        run: bash scripts/verify_phase9_hub_pipeline_batch07.sh
